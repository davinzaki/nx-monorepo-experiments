name: Build and Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Lint & Test hanya yang terpengaruh
        run: |
          npx nx affected -t lint,test --base=origin/main~1 --head=HEAD

      - name: Login ke GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build dan push image sfa
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          build-args: APP_NAME=sfa
          tags: ghcr.io/${{ github.repository }}/sfa:latest

      - name: Build dan push image dms
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          build-args: APP_NAME=dms
          tags: ghcr.io/${{ github.repository }}/dms:latest

      - name: Deploy ke VPS via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ~/app/nx-monorepo-experimental
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            docker image prune -f
